<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 电商平台</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .form-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input.error {
            border-color: #e53935;
        }

        .error-message {
            color: #e53935;
            font-size: 12px;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            cursor: pointer;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .forgot-password {
            color: #667eea;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #764ba2;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-btn .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: #999;
            font-size: 14px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
        }

        .social-login {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #e0e0e0;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .social-btn.wechat:hover { border-color: #07c160; color: #07c160; }
        .social-btn.qq:hover { border-color: #12b7f5; color: #12b7f5; }
        .social-btn.weibo:hover { border-color: #e6162d; color: #e6162d; }

        .register-link {
            text-align: center;
            color: #666;
            font-size: 14px;
        }

        .register-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #764ba2;
        }

        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #999;
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .back-home:hover {
            color: #667eea;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 10000;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.success {
            background: #4caf50;
            color: white;
        }

        .toast.error {
            background: #e53935;
            color: white;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .login-header h1 {
                font-size: 24px;
            }

            .form-options {
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>欢迎登录</h1>
            <p>登录后享受更多会员权益</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="username" name="username" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="error-message" id="usernameError">请输入用户名</div>
            </div>

            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" name="password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <div class="error-message" id="passwordError">请输入密码</div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox" id="rememberMe">
                    <span>记住我</span>
                </label>
                <a href="#" class="forgot-password">忘记密码？</a>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span class="btn-text">登 录</span>
            </button>
        </form>

        <div class="divider">
            <span>或</span>
        </div>

        <div class="social-login">
            <button class="social-btn wechat" title="微信登录">
                <i class="fab fa-weixin"></i>
            </button>
            <button class="social-btn qq" title="QQ登录">
                <i class="fab fa-qq"></i>
            </button>
            <button class="social-btn weibo" title="微博登录">
                <i class="fab fa-weibo"></i>
            </button>
        </div>

        <div class="register-link">
            还没有账号？<a href="zhuce.html">立即注册</a>
        </div>

        <a href="index.html" class="back-home">
            <i class="fas fa-home"></i> 返回首页
        </a>
    </div>

    <!-- Toast 提示 -->
    <div class="toast" id="toast"></div>

    <script>
        // Toast提示函数
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // 表单验证
        function validateForm() {
            let isValid = true;
            const username = document.getElementById('username');
            const password = document.getElementById('password');

            // 清除之前的错误状态
            username.classList.remove('error');
            password.classList.remove('error');
            document.getElementById('usernameError').classList.remove('show');
            document.getElementById('passwordError').classList.remove('show');

            // 验证用户名
            if (!username.value.trim()) {
                username.classList.add('error');
                document.getElementById('usernameError').textContent = '请输入用户名';
                document.getElementById('usernameError').classList.add('show');
                isValid = false;
            } else if (username.value.trim().length < 3) {
                username.classList.add('error');
                document.getElementById('usernameError').textContent = '用户名至少3个字符';
                document.getElementById('usernameError').classList.add('show');
                isValid = false;
            }

            // 验证密码
            if (!password.value) {
                password.classList.add('error');
                document.getElementById('passwordError').textContent = '请输入密码';
                document.getElementById('passwordError').classList.add('show');
                isValid = false;
            } else if (password.value.length < 6) {
                password.classList.add('error');
                document.getElementById('passwordError').textContent = '密码至少6个字符';
                document.getElementById('passwordError').classList.add('show');
                isValid = false;
            }

            return isValid;
        }

        // 获取用户列表
        function getUsers() {
            return JSON.parse(localStorage.getItem('users') || '[]');
        }

        // 验证用户登录
        function validateLogin(username, password) {
            const users = getUsers();
            return users.find(u => (u.username === username || u.email === username) && u.password === password);
        }

        // 登录表单提交
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            if (!validateForm()) {
                return;
            }

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const btnText = loginBtn.querySelector('.btn-text');

            // 显示加载状态
            loginBtn.disabled = true;
            btnText.innerHTML = '<div class="spinner"></div> 登录中...';

            // 使用本地存储验证
            setTimeout(() => {
                const user = validateLogin(username, password);
                
                if (user) {
                    // 登录成功
                    showToast('登录成功！', 'success');
                    
                    // 保存用户信息到localStorage
                    localStorage.setItem('user_id', user.id);
                    localStorage.setItem('username', user.username);
                    localStorage.setItem('isLoggedIn', 'true');
                    
                    // 记住我功能
                    if (document.getElementById('rememberMe').checked) {
                        localStorage.setItem('rememberUsername', username);
                    } else {
                        localStorage.removeItem('rememberUsername');
                    }

                    // 延迟跳转，让用户看到成功提示
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    // 登录失败
                    showToast('用户名或密码不正确', 'error');
                    loginBtn.disabled = false;
                    btnText.textContent = '登 录';
                }
            }, 500);
        });

        // 输入框获取焦点时清除错误状态
        document.getElementById('username').addEventListener('focus', function() {
            this.classList.remove('error');
            document.getElementById('usernameError').classList.remove('show');
        });

        document.getElementById('password').addEventListener('focus', function() {
            this.classList.remove('error');
            document.getElementById('passwordError').classList.remove('show');
        });

        // 页面加载时检查是否已登录，以及填充记住的用户名
        window.addEventListener('DOMContentLoaded', function() {
            // 检查是否已登录
            if (localStorage.getItem('isLoggedIn') === 'true') {
                // 已登录，跳转到首页
                window.location.href = 'index.html';
                return;
            }

            // 填充记住的用户名
            const savedUsername = localStorage.getItem('rememberUsername');
            if (savedUsername) {
                document.getElementById('username').value = savedUsername;
                document.getElementById('rememberMe').checked = true;
            }
        });
    </script>
</body>
</html>
