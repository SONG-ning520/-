<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商家后台管理</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px 30px;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .page-header h1 {
            color: white;
            font-size: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .header-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-btn.primary {
            background: white;
            color: #667eea;
        }

        .header-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255,255,255,0.3);
        }

        .header-btn.secondary {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .header-btn.secondary:hover {
            background: rgba(255,255,255,0.3);
        }

        /* 上部盒子区域 */
        .upper-section {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 左侧盒子 - 商家基本信息 */
        .left-box {
            flex: 0 0 400px;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .box-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .box-header h2 {
            font-size: 18px;
            color: #333;
        }

        .box-header .icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }

        .form-group .input-with-icon {
            position: relative;
        }

        .form-group .input-with-icon i {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .form-group .input-with-icon input {
            padding-right: 40px;
        }

        .form-row {
            display: flex;
            gap: 15px;
        }

        .form-row .form-group {
            flex: 1;
        }

        .save-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .save-btn.success {
            background: linear-gradient(135deg, #4caf50 0%, #45a049 100%);
        }

        /* 右侧盒子 - 商品管理 */
        .right-box {
            flex: 1;
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
        }

        .right-box .box-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .add-product-btn {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .add-product-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* 商品列表容器 - 支持滚动 */
        .products-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 10px;
            margin-top: 15px;
            max-height: 500px;
        }

        .products-container::-webkit-scrollbar {
            width: 8px;
        }

        .products-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        .products-container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 4px;
        }

        /* 商品盒子框架 - 与首页商品盒子保持一致 */
        .product-box {
            background: #f8f9fa;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            display: flex;
            gap: 15px;
            transition: all 0.3s ease;
            position: relative;
            height: 280px; /* 与首页商品盒子高度一致 */
        }

        .product-box:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.15);
        }

        .product-box:last-child {
            margin-bottom: 0;
        }

        /* 商品图片区域 - 与首页保持一致 */
        .product-image-area {
            width: 140px;
            height: 140px;
            border-radius: 10px;
            background: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
            flex-shrink: 0;
        }

        .product-image-area:hover {
            background: #d0d0d0;
        }

        .product-image-area i {
            font-size: 30px;
            color: #999;
        }

        .product-image-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-image-area .upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(102, 126, 234, 0.8);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .product-image-area:hover .upload-overlay {
            opacity: 1;
        }

        /* 商品信息区域 */
        .product-info-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .product-info-area .form-group {
            margin-bottom: 0;
        }

        .product-info-area .form-group input {
            padding: 10px 12px;
        }

        .product-info-area .form-group label {
            font-size: 12px;
            margin-bottom: 5px;
        }

        /* 填写进度条 */
        .progress-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #e0e0e0;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .progress-percent {
            font-weight: 600;
            color: #667eea;
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            border-radius: 3px;
            transition: width 0.3s ease;
        }

        .progress-hint {
            font-size: 11px;
            margin-top: 5px;
        }

        /* 商品操作按钮 */
        .product-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }

        .product-action-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            z-index: 100;
            pointer-events: auto;
            position: relative;
        }

        .product-action-btn.edit {
            background: #e3f2fd;
            color: #1976d2;
        }

        .product-action-btn.edit:hover {
            background: #1976d2;
            color: white;
        }

        .product-action-btn.save {
            background: #fff3e0;
            color: #ff9800;
        }

        .product-action-btn.save:hover {
            background: #ff9800;
            color: white;
        }

        .product-action-btn.delete {
            background: #ffebee;
            color: #e53935;
        }

        .product-action-btn.delete:hover {
            background: #e53935;
            color: white;
        }

        .product-action-btn.publish {
            background: #e8f5e9;
            color: #4caf50;
        }

        .product-action-btn.publish:hover {
            background: #4caf50;
            color: white;
        }

        .product-action-btn.publish.published {
            background: #f5f5f5;
            color: #999;
            cursor: not-allowed;
        }

        /* 空状态 */
        .empty-products {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-products i {
            font-size: 48px;
            margin-bottom: 15px;
            color: #ddd;
        }

        .empty-products p {
            font-size: 14px;
        }

        /* 统计信息 */
        .stats-bar {
            display: flex;
            gap: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 15px;
        }

        .stat-item {
            flex: 1;
            text-align: center;
        }

        .stat-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .stat-item .label {
            font-size: 12px;
            color: #666;
        }

        /* 提示消息 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            background: #4caf50;
            color: white;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            gap: 10px;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            background: #e53935;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* 响应式设计 */
        @media (max-width: 900px) {
            .upper-section {
                flex-direction: column;
            }

            .left-box {
                flex: none;
                width: 100%;
            }

            .right-box {
                width: 100%;
            }

            .products-container {
                max-height: 400px;
            }
        }

        @media (max-width: 600px) {
            .page-header {
                flex-direction: column;
                gap: 15px;
            }

            .header-actions {
                width: 100%;
                justify-content: center;
            }

            .form-row {
                flex-direction: column;
            }

            .product-box {
                flex-direction: column;
            }

            .product-image-area {
                width: 100%;
                height: 150px;
            }

            .product-actions {
                flex-direction: row;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>
    <!-- 页面头部 -->
    <div class="page-header">
        <h1><i class="fas fa-store"></i> 商家后台管理</h1>
        <div class="header-actions">
            <button class="header-btn secondary" onclick="logoutMerchant()">
                <i class="fas fa-sign-out-alt"></i> 退出登录
            </button>
            <button class="header-btn secondary" onclick="window.location.href='index.html'">
                <i class="fas fa-home"></i> 返回首页
            </button>
            <button class="header-btn primary" onclick="viewStore()">
                <i class="fas fa-eye"></i> 查看店铺
            </button>
        </div>
    </div>

    <!-- 上部盒子区域 -->
    <div class="upper-section">
        <!-- 左侧盒子 - 商家基本信息 -->
        <div class="left-box">
            <div class="box-header">
                <div class="icon"><i class="fas fa-info-circle"></i></div>
                <h2>商家基本信息</h2>
            </div>

            <div class="form-group">
                <label><i class="fas fa-store-alt"></i> 店铺名称</label>
                <input type="text" id="storeName" placeholder="请输入店铺名称" value="">
            </div>

            <div class="form-group">
                <label><i class="fas fa-phone"></i> 联系电话</label>
                <div class="input-with-icon">
                    <input type="tel" id="storePhone" placeholder="请输入联系电话">
                    <i class="fas fa-phone"></i>
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> 商家地址</label>
                <textarea id="storeAddress" placeholder="请输入详细地址"></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label><i class="fas fa-clock"></i> 营业时间</label>
                    <input type="text" id="businessHours" placeholder="如：09:00-21:00">
                </div>
            </div>

            <div class="form-group">
                <label><i class="fas fa-align-left"></i> 商家简介</label>
                <textarea id="storeDescription" placeholder="请输入商家简介（最多200字）" maxlength="200"></textarea>
            </div>

            <button class="save-btn" id="saveInfoBtn" onclick="saveStoreInfo()">
                <i class="fas fa-save"></i> 保存信息
            </button>
        </div>

        <!-- 右侧盒子 - 商品管理 -->
        <div class="right-box">
            <div class="box-header">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="icon"><i class="fas fa-boxes"></i></div>
                    <h2>商品管理</h2>
                </div>
                <button class="add-product-btn" onclick="addProduct()">
                    <i class="fas fa-plus"></i> 添加商品
                </button>
            </div>

            <!-- 统计信息 -->
            <div class="stats-bar">
                <div class="stat-item">
                    <div class="value" id="totalProducts">0</div>
                    <div class="label">商品总数</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="totalValue">¥0</div>
                    <div class="label">商品总价值</div>
                </div>
                <div class="stat-item">
                    <div class="value" id="avgPrice">¥0</div>
                    <div class="label">平均价格</div>
                </div>
            </div>

            <!-- 商品列表容器 -->
            <div class="products-container" id="productsContainer">
                <!-- 空状态 -->
                <div class="empty-products" id="emptyState">
                    <i class="fas fa-box-open"></i>
                    <p>暂无商品，点击"添加商品"开始添加</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/merchant-products.js"></script>
    <script>
        let products = [];
        let merchantId = '';

        document.addEventListener('DOMContentLoaded', function() {
            if (!checkMerchantLogin()) {
                return;
            }
            
            merchantId = localStorage.getItem('merchant_id') || '';
            loadStoreInfo();
            loadProducts();
        });
        
        function goToEdit(productId) {
            console.log('goToEdit被调用，productId:', productId, '类型:', typeof productId);
            
            try {
                const product = merchantProductDB.getProductById(productId);
                if (product) {
                    console.log('找到商品:', product.name);
                    localStorage.setItem('editing_product', JSON.stringify(product));
                } else {
                    console.warn('未找到商品，直接跳转');
                }
                
                const editPageUrl = 'product-edit.html?id=' + productId;
                console.log('跳转到:', editPageUrl);
                
                window.location.href = editPageUrl;
            } catch (e) {
                console.error('跳转失败:', e);
                showToast('跳转失败，请重试', 'error');
            }
        }

        function checkMerchantLogin() {
            const isLoggedIn = localStorage.getItem('is_merchant_logged_in');
            
            if (!isLoggedIn || isLoggedIn !== 'true') {
                window.location.href = 'merchant-login.html';
                return false;
            }
            
            const merchantStoreName = localStorage.getItem('merchant_store_name');
            if (merchantStoreName) {
                const pageHeader = document.querySelector('.page-header h1');
                if (pageHeader) {
                    pageHeader.innerHTML = `<i class="fas fa-store"></i> ${merchantStoreName} - 商家后台`;
                }
            }
            
            return true;
        }
        
        // 标准化图片路径（处理商家后台和首页的路径差异）
        // xiahezi.html 在 html/ 目录下，图片在 tupian/ 目录下（同级）
        // 所以保存到 home_products 的路径应该是 ../tupian/
        function normalizeImagePath(imagePath) {
            if (!imagePath) {
                return '../tupian/Snipaste_2026-06-13_16-59-18.png';
            }
            
            // 如果是Base64编码的图片，直接返回
            if (imagePath.startsWith('data:image/')) {
                return imagePath;
            }
            
            // 如果是绝对路径，直接返回
            if (imagePath.startsWith('/') || imagePath.startsWith('http')) {
                return imagePath;
            }
            
            // 如果路径已经是 ../tupian/ 开头，直接返回
            if (imagePath.startsWith('../tupian/')) {
                return imagePath;
            }
            
            // 如果路径已经是 tupian/ 开头，加上 ../
            if (imagePath.startsWith('tupian/')) {
                return '../' + imagePath;
            }
            
            // 如果路径以 ../ 开头（但不是 ../tupian/），去掉 ../ 并加上 ../tupian/
            if (imagePath.startsWith('../')) {
                const relativePath = imagePath.substring(3);
                if (relativePath.startsWith('tupian/')) {
                    return '../' + relativePath;
                }
                return '../tupian/' + relativePath;
            }
            
            // 默认返回 ../tupian/ + 原路径
            return '../tupian/' + imagePath;
        }

        function logoutMerchant() {
            if (confirm('确定要退出商家后台吗？')) {
                localStorage.removeItem('merchant_id');
                localStorage.removeItem('merchant_username');
                localStorage.removeItem('merchant_store_name');
                localStorage.removeItem('is_merchant_logged_in');
                window.location.href = 'merchant-login.html';
            }
        }

        function loadStoreInfo() {
            const storeInfo = localStorage.getItem('store_info');
            if (storeInfo) {
                const data = JSON.parse(storeInfo);
                document.getElementById('storeName').value = data.name || '';
                document.getElementById('storePhone').value = data.phone || '';
                document.getElementById('storeAddress').value = data.address || '';
                document.getElementById('businessHours').value = data.hours || '';
                document.getElementById('storeDescription').value = data.description || '';
            }
        }

        function saveStoreInfo() {
            const name = document.getElementById('storeName').value.trim();
            const phone = document.getElementById('storePhone').value.trim();
            const address = document.getElementById('storeAddress').value.trim();
            const hours = document.getElementById('businessHours').value.trim();
            const description = document.getElementById('storeDescription').value.trim();

            if (!name) {
                showToast('请输入店铺名称', 'error');
                return;
            }

            if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号码', 'error');
                return;
            }

            const storeInfo = {
                name,
                phone,
                address,
                hours,
                description,
                updatedAt: new Date().toISOString()
            };

            localStorage.setItem('store_info', JSON.stringify(storeInfo));

            const btn = document.getElementById('saveInfoBtn');
            btn.classList.add('success');
            btn.innerHTML = '<i class="fas fa-check"></i> 保存成功';
            
            showToast('商家信息保存成功');

            setTimeout(() => {
                btn.classList.remove('success');
                btn.innerHTML = '<i class="fas fa-save"></i> 保存信息';
            }, 2000);
        }

        function loadProducts() {
            products = merchantProductDB.getProductsByMerchant(merchantId);
            renderProducts();
        }

        function addProduct() {
            const result = merchantProductDB.addProduct({
                merchantId: merchantId,
                name: '',
                price: '',
                image: '',
                description: '',
                stock: ''
            });

            if (result.success) {
                products = merchantProductDB.getProductsByMerchant(merchantId);
                renderProducts();
                showToast('商品添加成功，请完善商品信息');
            } else {
                showToast(result.message, 'error');
            }
        }

        function renderProducts() {
            const container = document.getElementById('productsContainer');
            const emptyState = document.getElementById('emptyState');

            if (products.length === 0) {
                const productBoxes = container.querySelectorAll('.product-box');
                productBoxes.forEach(box => box.remove());
                emptyState.style.display = 'block';
                while (container.firstChild) {
                    if (container.firstChild !== emptyState) {
                        container.removeChild(container.firstChild);
                    } else {
                        break;
                    }
                }
            } else {
                emptyState.style.display = 'none';
                container.innerHTML = products.map(product => createProductHTML(product)).join('');
            }

            updateStats();
        }

        function createProductHTML(product) {
            const isPublished = product.published === true;
            
            // 检查必填项是否完整
            const missingBasic = !product.name || !product.price || !product.stock || (!product.image && !product.mainImage);
            const missingDetail = !product.category || !product.intro || !product.detail || !product.afterService;
            const isComplete = !missingBasic && !missingDetail;
            
            // 计算填写进度
            let progress = 0;
            if (product.name) progress += 12.5;
            if (product.price) progress += 12.5;
            if (product.stock) progress += 12.5;
            if (product.image || product.mainImage) progress += 12.5;
            if (product.category) progress += 12.5;
            if (product.intro) progress += 12.5;
            if (product.detail) progress += 12.5;
            if (product.afterService) progress += 12.5;
            
            return `
                <div class="product-box" data-id="${product.id}">
                    <div class="product-image-area" onclick="selectImage(${product.id})">
                        ${product.image || product.mainImage
                            ? `<img src="${product.image || product.mainImage}" alt="商品图片">
                               <div class="upload-overlay"><i class="fas fa-camera"></i></div>`
                            : `<i class="fas fa-image"></i>
                               <div class="upload-overlay"><i class="fas fa-camera"></i> 点击上传</div>`
                        }
                        <input type="file" id="imageInput${product.id}" accept="image/*" style="display: none;" onchange="handleImageSelect(${product.id}, this)">
                    </div>
                    <div class="product-info-area">
                        <div class="form-group">
                            <label>商品名称</label>
                            <input type="text" value="${product.name}" placeholder="请输入商品名称" onchange="updateProduct(${product.id}, 'name', this.value)">
                        </div>
                        <div class="form-group">
                            <label>商品价格</label>
                            <input type="number" value="${product.price}" placeholder="请输入价格" min="0" step="0.01" onchange="updateProduct(${product.id}, 'price', this.value)">
                        </div>
                        <div class="form-group">
                            <label>库存数量</label>
                            <input type="number" value="${product.stock}" placeholder="请输入库存" min="0" onchange="updateProduct(${product.id}, 'stock', this.value)">
                        </div>
                        <!-- 填写进度条 -->
                        <div class="progress-section">
                            <div class="progress-label">
                                <span>填写进度</span>
                                <span class="progress-percent">${Math.round(progress)}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                            <div class="progress-hint">
                                ${isComplete 
                                    ? '<span style="color: #4caf50;"><i class="fas fa-check"></i> 信息完整，可发布</span>' 
                                    : missingDetail 
                                        ? '<span style="color: #ff9800;"><i class="fas fa-info-circle"></i> 请点击编辑详情完善信息</span>'
                                        : '<span style="color: #ff9800;"><i class="fas fa-info-circle"></i> 请完善基本信息</span>'
                                }
                            </div>
                        </div>
                    </div>
                    <div class="product-actions">
                        <button class="product-action-btn save" onclick="saveProductData(${product.id})" title="保存数据">
                            <i class="fas fa-save"></i>
                        </button>
                        <button class="product-action-btn edit" onclick="goToEdit(${product.id})" title="编辑详情">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="product-action-btn publish ${isPublished ? 'published' : ''}" 
                                onclick="publishProduct(${product.id})" 
                                title="${isPublished ? '已发布' : (isComplete ? '发布商品' : '请完善信息')}"
                                ${isPublished || !isComplete ? 'disabled' : ''}>
                            <i class="fas fa-${isPublished ? 'check' : 'paper-plane'}"></i>
                        </button>
                        <button class="product-action-btn delete" onclick="deleteProduct(${product.id})" title="删除商品">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
            `;
        }

        function selectImage(productId) {
            document.getElementById(`imageInput${productId}`).click();
        }

        function handleImageSelect(productId, input) {
            const file = input.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showToast('请选择图片文件', 'error');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                showToast('图片大小不能超过5MB', 'error');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                updateProduct(productId, 'image', e.target.result);
                showToast('图片上传成功');
            };
            reader.readAsDataURL(file);
        }

        function updateProduct(productId, field, value) {
            const result = merchantProductDB.updateProduct(productId, { [field]: value });
            
            if (result.success) {
                products = merchantProductDB.getProductsByMerchant(merchantId);
                renderProducts();
                updateStats();
            } else {
                showToast(result.message, 'error');
            }
        }

        function saveProductData(productId) {
            const product = merchantProductDB.getProductById(productId);
            if (!product) {
                showToast('商品不存在', 'error');
                return;
            }

            const result = merchantProductDB.updateProduct(productId, {
                updatedAt: new Date().toISOString()
            });

            if (result.success) {
                showToast('商品数据已保存');
            } else {
                showToast(result.message, 'error');
            }
        }

        async function publishProduct(productId) {
            console.log('publishProduct被调用，商品ID:', productId);
            
            // 获取发布按钮元素，设置加载状态
            const publishBtn = document.querySelector(`button[onclick="publishProduct(${productId})"]`);
            const originalBtnContent = publishBtn.innerHTML;
            
            // 设置按钮加载状态
            publishBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            publishBtn.disabled = true;
            
            try {
                const product = merchantProductDB.getProductById(productId);
                console.log('获取到的商品数据:', product);
                
                if (!product) {
                    showToast('商品不存在', 'error');
                    return;
                }
                
                // 数据验证
                const validationResult = validateProductData(product);
                if (!validationResult.valid) {
                    const errorMsg = validationResult.missingFields.length > 0 
                        ? `请完善以下信息后再发布：${validationResult.missingFields.join('、')}`
                        : validationResult.errors.join('、');
                    showToast(errorMsg, 'error');
                    return;
                }
                
                const storeInfo = localStorage.getItem('store_info');
                const storeName = storeInfo ? JSON.parse(storeInfo).storeName || '我的店铺' : '我的店铺';
                
                // 构建完整的商品数据（包含描述等信息）
                const publishedProduct = {
                    name: product.name,
                    category: product.category || '商家商品',
                    price: parseFloat(product.price),
                    originalPrice: Math.floor(parseFloat(product.price) * 1.3),
                    image: normalizeImagePath(product.image || product.mainImage),
                    storeName: storeName,
                    unit: product.unit || '件',
                    stock: parseInt(product.stock) || 0,
                    intro: product.intro || '',
                    detail: product.detail || '',
                    afterService: product.afterService || '',
                    merchantId: merchantId || 'default'
                };
                
                console.log('准备发送到后端的商品:', publishedProduct);
                
                // 发送到后端API
                let apiSuccess = false;
                let backendProductId = null;
                try {
                    const response = await fetch('http://localhost:5000/api/merchant/product', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(publishedProduct)
                    });
                    
                    const result = await response.json();
                    console.log('后端API返回:', result);
                    
                    if (result.code === 200) {
                        apiSuccess = true;
                        backendProductId = result.data && result.data.id;
                        console.log('商品已成功发布到后端，后端ID:', backendProductId);
                    } else {
                        showToast(`发布失败：${result.message}`, 'error');
                        publishBtn.innerHTML = originalBtnContent;
                        publishBtn.disabled = false;
                        return;
                    }
                } catch (apiError) {
                    console.warn('后端API调用失败:', apiError);
                    showToast('发布失败：网络连接异常，请检查网络后重试', 'error');
                    publishBtn.innerHTML = originalBtnContent;
                    publishBtn.disabled = false;
                    return;
                }
                
                // 更新商品状态
                const updateResult = merchantProductDB.updateProduct(productId, {
                    published: true,
                    publishedAt: new Date().toISOString(),
                    backendId: backendProductId
                });

                if (updateResult.success) {
                    products = merchantProductDB.getProductsByMerchant(merchantId);
                    renderProducts();
                    
                    // 构建用于localStorage的商品数据
                    const localStorageProduct = {
                        id: backendProductId || ('store_' + product.id),
                        name: product.name,
                        category: product.category || '商家商品',
                        price: parseFloat(product.price),
                        originalPrice: Math.floor(parseFloat(product.price) * 1.3),
                        image: normalizeImagePath(product.image || product.mainImage),
                        rating: (Math.random() * 2 + 3).toFixed(1),
                        storeName: storeName,
                        isStoreProduct: true,
                        unit: product.unit || '件',
                        stock: parseInt(product.stock) || 0,
                        intro: product.intro || '',
                        description: product.detail || '',
                        afterService: product.afterService || ''
                    };
                    
                    // 保存到 localStorage（作为备用）
                    const homeProducts = JSON.parse(localStorage.getItem('home_products') || '[]');
                    console.log('当前home_products数量:', homeProducts.length);
                    
                    // 检查是否已存在相同ID的商品
                    const existingIndex = homeProducts.findIndex(p => p.id === localStorageProduct.id);
                    if (existingIndex >= 0) {
                        homeProducts[existingIndex] = localStorageProduct;
                    } else {
                        homeProducts.push(localStorageProduct);
                    }
                    
                    localStorage.setItem('home_products', JSON.stringify(homeProducts));
                    console.log('保存成功，home_products新数量:', homeProducts.length);
                    
                    showToast(apiSuccess ? '商品发布成功！正在返回首页...' : '商品已保存，正在返回首页...');
                    
                    // 延迟1.5秒后跳回首页
                    setTimeout(() => {
                        window.location.href = '../index.html';
                    }, 1500);
                } else {
                    console.error('更新商品失败:', updateResult.message);
                    showToast(updateResult.message, 'error');
                }
            } catch (error) {
                console.error('发布商品时发生错误:', error);
                showToast('发布商品时发生错误，请重试', 'error');
            } finally {
                // 恢复按钮状态（如果还没跳转）
                setTimeout(() => {
                    if (publishBtn && !publishBtn.disabled) {
                        publishBtn.innerHTML = originalBtnContent;
                        publishBtn.disabled = false;
                    }
                }, 2000);
            }
        }
        
        // 商品数据验证函数
        function validateProductData(product) {
            const missingFields = [];
            const errors = [];
            
            // 商品名称验证
            if (!product.name || product.name.trim() === '') {
                missingFields.push('商品名称');
            }
            
            // 商品价格验证
            if (!product.price) {
                missingFields.push('商品价格');
            } else {
                const price = parseFloat(product.price);
                if (isNaN(price) || price <= 0) {
                    errors.push('商品价格必须大于0');
                }
            }
            
            // 库存数量验证
            if (!product.stock) {
                missingFields.push('库存数量');
            } else {
                const stock = parseInt(product.stock);
                if (isNaN(stock) || stock < 0) {
                    errors.push('库存数量必须是非负整数');
                }
            }
            
            // 商品图片验证
            if (!product.image && !product.mainImage) {
                missingFields.push('商品图片');
            } else {
                const imagePath = product.image || product.mainImage;
                // 验证图片格式
                const validExtensions = ['.jpg', '.jpeg', '.png', '.gif', '.webp', '.bmp'];
                const isValidFormat = imagePath.startsWith('data:image/') || 
                                     validExtensions.some(ext => imagePath.toLowerCase().endsWith(ext));
                if (!isValidFormat) {
                    errors.push('商品图片格式不支持，请选择jpg、png、gif等格式');
                }
            }
            
            // 商品分类验证
            if (!product.category || product.category.trim() === '') {
                missingFields.push('商品分类');
            }
            
            // 商品简介验证 - 后端必填字段
            if (!product.intro || product.intro.trim() === '') {
                missingFields.push('商品简介');
            }
            
            // 详细描述验证 - 后端必填字段
            if (!product.detail || product.detail.trim() === '') {
                missingFields.push('详细描述');
            }
            
            // 售后服务验证 - 后端必填字段
            if (!product.afterService || product.afterService.trim() === '') {
                missingFields.push('售后服务');
            }
            
            return {
                valid: missingFields.length === 0 && errors.length === 0,
                missingFields: missingFields,
                errors: errors
            };
        }

        async function deleteProduct(productId) {
            if (!confirm('确定要删除这个商品吗？此操作不可撤销！')) {
                return;
            }
            
            const deleteBtn = document.querySelector(`button[onclick="deleteProduct(${productId})"]`);
            const originalBtnContent = deleteBtn ? deleteBtn.innerHTML : '';
            
            if (deleteBtn) {
                deleteBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                deleteBtn.disabled = true;
            }
            
            try {
                const product = merchantProductDB.getProductById(productId);
                const homeProductId = product ? (product.backendId || ('store_' + product.id)) : null;
                
                console.log('删除商品信息:', { productId, homeProductId });
                
                const response = await fetch(`http://localhost:5000/api/merchant/product/${homeProductId || productId}`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                    }
                });
                
                const result = await response.json();
                console.log('删除商品API返回:', result);
                
                if (result.code === 200) {
                    const localResult = merchantProductDB.deleteProduct(productId);
                    
                    if (localResult.success) {
                        products = merchantProductDB.getProductsByMerchant(merchantId);
                        renderProducts();
                        updateStats();
                        
                        const homeProducts = JSON.parse(localStorage.getItem('home_products') || '[]');
                        const filteredProducts = homeProducts.filter(p => p.id !== homeProductId);
                        localStorage.setItem('home_products', JSON.stringify(filteredProducts));
                        console.log('已从home_products删除商品:', homeProductId);
                        
                        localStorage.removeItem('editing_product');
                        console.log('已清除editing_product缓存');
                        
                        notifyHomePageDelete(homeProductId);
                        
                        showToast('商品删除成功！');
                    } else {
                        showToast(localResult.message, 'error');
                    }
                } else if (result.code === 404) {
                    const localResult = merchantProductDB.deleteProduct(productId);
                    if (localResult.success) {
                        products = merchantProductDB.getProductsByMerchant(merchantId);
                        renderProducts();
                        updateStats();
                        
                        const homeProducts = JSON.parse(localStorage.getItem('home_products') || '[]');
                        const filteredProducts = homeProducts.filter(p => p.id !== homeProductId);
                        localStorage.setItem('home_products', JSON.stringify(filteredProducts));
                        
                        localStorage.removeItem('editing_product');
                        
                        notifyHomePageDelete(homeProductId);
                        
                        showToast('商品已从本地删除', 'info');
                    } else {
                        showToast('商品不存在或已被删除', 'error');
                    }
                } else {
                    showToast(`删除失败：${result.message}`, 'error');
                }
            } catch (apiError) {
                console.warn('删除商品API调用失败:', apiError);
                
                const localResult = merchantProductDB.deleteProduct(productId);
                if (localResult.success) {
                    products = merchantProductDB.getProductsByMerchant(merchantId);
                    renderProducts();
                    updateStats();
                    
                    const homeProducts = JSON.parse(localStorage.getItem('home_products') || '[]');
                    const filteredProducts = homeProducts.filter(p => p.id !== homeProductId && p.id !== ('store_' + productId));
                    localStorage.setItem('home_products', JSON.stringify(filteredProducts));
                    
                    localStorage.removeItem('editing_product');
                    
                    notifyHomePageDelete(homeProductId || ('store_' + productId));
                    
                    showToast('网络异常，已在本地删除商品', 'warning');
                } else {
                    showToast('删除失败，请重试', 'error');
                }
            } finally {
                if (deleteBtn) {
                    deleteBtn.innerHTML = originalBtnContent;
                    deleteBtn.disabled = false;
                }
            }
        }
        
        function notifyHomePageDelete(productId) {
            try {
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'deleteProduct',
                        productId: productId
                    }, '*');
                    console.log('已发送删除通知给父窗口:', productId);
                }
                
                if (window.parent && window.parent !== window) {
                    window.parent.postMessage({
                        type: 'deleteProduct',
                        productId: productId
                    }, '*');
                    console.log('已发送删除通知给parent:', productId);
                }
                
                localStorage.setItem('delete_product_trigger', JSON.stringify({
                    productId: productId,
                    timestamp: Date.now()
                }));
                console.log('已设置localStorage删除触发器:', productId);
                
            } catch (error) {
                console.error('发送删除通知失败:', error);
            }
        }

        function editProduct(productId) {
            console.log('editProduct被调用，productId:', productId, '类型:', typeof productId);
            
            const product = merchantProductDB.getProductById(productId);
            console.log('获取到的商品:', product);
            
            if (product) {
                localStorage.setItem('editing_product', JSON.stringify(product));
                console.log('准备跳转:', 'product-edit.html?id=' + productId);
                window.location.href = 'product-edit.html?id=' + productId;
            } else {
                console.error('商品不存在，productId:', productId);
                
                const allProducts = merchantProductDB.getAllProducts();
                console.log('所有商品:', allProducts);
                
                const productsById = merchantProductDB.getProductsByMerchant(merchantId);
                console.log('当前商家商品:', productsById);
                
                showToast('商品不存在', 'error');
            }
        }

        function updateStats() {
            const stats = merchantProductDB.getMerchantStats(merchantId);
            const totalValue = products.reduce((sum, p) => sum + (parseFloat(p.price) || 0), 0);
            const avgPrice = stats.total > 0 ? totalValue / stats.total : 0;

            document.getElementById('totalProducts').textContent = stats.total;
            document.getElementById('totalValue').textContent = '¥' + totalValue.toFixed(2);
            document.getElementById('avgPrice').textContent = '¥' + avgPrice.toFixed(2);
        }

        function viewStore() {
            const storeInfo = localStorage.getItem('store_info');
            if (!storeInfo) {
                showToast('请先保存商家信息', 'error');
                return;
            }
            alert('店铺预览功能即将上线！');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast' + (type === 'error' ? ' error' : '');
            toast.innerHTML = `<i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'check-circle'}"></i> ${message}`;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }
    </script>
</body>
</html>
