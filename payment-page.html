<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认支付</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #f0f4f8 0%, #e8eef4 100%);
            min-height: 100vh;
        }

        /* 顶部导航 */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .page-header .back-btn {
            width: 48px;
            height: 48px;
            border: none;
            background: linear-gradient(135deg, #f0f2f5 0%, #e8eaed 100%);
            border-radius: 14px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #555;
            transition: all 0.3s ease;
        }

        .page-header .back-btn:hover {
            background: linear-gradient(135deg, #e8eaed 0%, #dfe1e5 100%);
            transform: scale(1.05);
        }

        .page-header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
            color: #2c3e50;
        }

        .page-header .placeholder {
            width: 48px;
        }

        /* 主内容区域 */
        .page-content {
            padding: 20px;
            padding-bottom: 140px;
        }

        /* 区块样式 */
        .section {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 17px;
            color: #2c3e50;
            margin: 0 0 20px 0;
            font-weight: 600;
        }

        .section-title i {
            color: #ff5252;
            font-size: 18px;
        }

        /* 金额卡片 */
        .amount-card {
            background: linear-gradient(135deg, #fff5f5 0%, #fff 100%);
            border-radius: 16px;
            padding: 24px;
            border: 2px solid #ffebee;
            box-shadow: 0 4px 16px rgba(255, 82, 82, 0.1);
        }

        .order-info {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .order-id {
            font-size: 14px;
            color: #888;
            font-family: 'Courier New', monospace;
        }

        .order-id span {
            color: #555;
            font-weight: 500;
        }

        .order-product {
            display: flex;
            gap: 16px;
            padding: 16px;
            background: #fff;
            border-radius: 12px;
        }

        .order-product img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }

        .product-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-info h3 {
            margin: 0;
            font-size: 15px;
            color: #2c3e50;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .product-info p {
            margin: 0;
            font-size: 13px;
            color: #999;
        }

        .order-price {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 8px 0;
            border-bottom: 1px dashed #eee;
        }

        .order-price:last-of-type {
            border-bottom: none;
        }

        .order-price .label {
            color: #666;
        }

        .order-price .value {
            color: #333;
            font-weight: 500;
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px dashed #ddd;
            font-size: 18px;
            font-weight: 600;
        }

        .order-total .label {
            color: #333;
        }

        .order-total .value {
            color: #ff5252;
            font-size: 28px;
        }

        /* 支付密码区域 */
        .password-section {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .password-input-wrapper {
            position: relative;
        }

        .password-input-wrapper input {
            width: 100%;
            height: 64px;
            padding: 0 24px;
            font-size: 28px;
            text-align: center;
            letter-spacing: 12px;
            border: 2px solid #e4e8ec;
            border-radius: 14px;
            outline: none;
            transition: all 0.3s ease;
            background: #fafafa;
        }

        .password-input-wrapper input:focus {
            border-color: #ff5252;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(255, 82, 82, 0.1);
        }

        .password-input-wrapper input.error {
            border-color: #ff5252;
            background: #fff5f5;
        }

        .password-tip {
            margin: 0;
            font-size: 13px;
            color: #999;
            text-align: center;
        }

        .password-tip i {
            margin-right: 4px;
        }

        /* 错误提示 */
        .error-message {
            display: none;
            padding: 12px 16px;
            background: #fff5f5;
            border-radius: 8px;
            color: #ff5252;
            font-size: 14px;
            text-align: center;
            animation: shake 0.3s ease;
            cursor: default;
            transition: all 0.3s;
        }

        .error-message.show {
            display: block;
        }

        .error-message.clickable {
            cursor: pointer;
            background: #fff0f0;
        }

        .error-message.clickable:hover {
            background: #ffe8e8;
            transform: scale(1.02);
        }

        .error-message.clickable span {
            text-decoration: underline;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        /* 操作按钮 */
        .action-buttons {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            gap: 16px;
            padding: 20px;
            background: linear-gradient(135deg, #ffffff 0%, #f8f9fa 100%);
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
        }

        .btn {
            flex: 1;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .btn-secondary {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            color: #666;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .btn-secondary:hover {
            background: linear-gradient(135deg, #e4e8ec 0%, #d0d5db 100%);
            transform: translateY(-1px);
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff5252 0%, #ff1744 100%);
            color: #fff;
            box-shadow: 0 4px 16px rgba(255, 82, 82, 0.3);
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #ff1744 0%, #d50000 100%);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255, 82, 82, 0.4);
        }

        /* 支付成功弹窗 */
        .success-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .success-overlay.show {
            display: flex;
        }

        .success-modal {
            background: #fff;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            animation: modalSlideIn 0.4s ease-out;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 360px;
            width: 90%;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.85) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #4caf50 0%, #388e3c 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(76, 175, 80, 0.4);
            animation: successBounce 0.6s ease-out;
        }

        @keyframes successBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .success-icon i {
            font-size: 52px;
            color: #fff;
        }

        .success-modal h2 {
            margin: 0 0 12px 0;
            font-size: 24px;
            color: #2c3e50;
            font-weight: 600;
        }

        .success-modal p {
            margin: 0 0 32px 0;
            color: #888;
            font-size: 15px;
            line-height: 1.6;
        }

        .success-modal .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
        }

        /* 加载状态 */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9998;
            justify-content: center;
            align-items: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ff5252;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 响应式设计 */
        @media (max-width: 480px) {
            .page-header h1 {
                font-size: 18px;
            }

            .page-content {
                padding: 16px;
                padding-bottom: 130px;
            }

            .section {
                padding: 20px 16px;
            }

            .order-product img {
                width: 70px;
                height: 70px;
            }

            .password-input-wrapper input {
                font-size: 24px;
                letter-spacing: 8px;
            }

            .btn {
                padding: 16px;
                font-size: 15px;
            }

            .success-modal {
                padding: 40px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="payment-page">
        <!-- 顶部导航 -->
        <header class="page-header">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>确认支付</h1>
            <div class="placeholder"></div>
        </header>

        <!-- 主内容 -->
        <main class="page-content">
            <!-- 商品金额确认 -->
            <div class="section">
                <h2 class="section-title">
                    <i class="fas fa-receipt"></i>
                    商品金额确认
                </h2>
                <div class="amount-card" id="amountCard">
                    <!-- 订单信息 -->
                </div>
            </div>

            <!-- 支付密码输入 -->
            <div class="section">
                <h2 class="section-title">
                    <i class="fas fa-lock"></i>
                    支付密码
                </h2>
                <div class="password-section">
                    <div class="password-input-wrapper">
                        <input type="password" id="passwordInput" placeholder="请输入支付密码" maxlength="6">
                    </div>
                    <p class="password-tip">
                        <i class="fas fa-info-circle"></i>
                        支付密码为安全中心设置的6位数字密码
                    </p>
                    <div class="error-message" id="errorMessage">
                        <i class="fas fa-exclamation-circle"></i>
                        <span id="errorText">支付密码错误</span>
                    </div>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="action-buttons">
                <button class="btn btn-secondary" id="returnBtn">
                    <i class="fas fa-arrow-left"></i>
                    返回我再想想
                </button>
                <button class="btn btn-primary" id="payBtn">
                    <i class="fas fa-check-circle"></i>
                    支付
                </button>
            </div>
        </main>

        <!-- 加载遮罩 -->
        <div class="loading-overlay" id="loadingOverlay">
            <div class="loading-spinner"></div>
        </div>

        <!-- 支付成功弹窗 -->
        <div class="success-overlay" id="successOverlay">
            <div class="success-modal">
                <div class="success-icon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h2>支付成功</h2>
                <p>订单已提交，等待商家发货</p>
                <button class="btn btn-primary" id="goToOrdersBtn">
                    查看订单
                </button>
            </div>
        </div>
    </div>

    <script src="/js/orderManagement.js"></script>
    <script src="/js/payment-page.js"></script>
</body>
</html>
