<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付确认</title>
    <style>
        /* 页面基础样式 - 弹窗直接显示 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: rgba(0, 0, 0, 0.6);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .payment-modal {
            background: #fff;
            border-radius: 16px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease-out;
            position: relative;
        }
        
        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        
        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            border: none;
            background: #f5f5f5;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #666;
            transition: all 0.2s;
            z-index: 10;
        }
        
        .modal-close:hover {
            background: #eee;
            color: #333;
        }
        
        .modal-section {
            padding: 20px 24px;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: #333;
            margin: 0 0 16px 0;
            font-weight: 600;
        }
        
        .section-title i {
            color: #ff6b6b;
        }
        
        /* 收货地址选择 */
        .address-selector {
            min-height: 80px;
            border: 2px dashed #ddd;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }
        
        .address-selector.selected {
            border-style: solid;
            border-color: #ff6b6b;
            background: #fff5f5;
        }
        
        .address-placeholder {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
            color: #999;
        }
        
        .address-placeholder i {
            font-size: 24px;
        }
        
        .address-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        
        .address-info .name-phone {
            display: flex;
            gap: 12px;
            font-weight: 600;
            color: #333;
        }
        
        .address-info .address-detail {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .address-btn {
            width: 100%;
            padding: 12px;
            border: 1px solid #ff6b6b;
            background: #fff;
            color: #ff6b6b;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
            font-size: 14px;
        }
        
        .address-btn:hover {
            background: #fff5f5;
        }
        
        /* 支付方式选择 */
        .payment-methods {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .payment-method {
            display: flex;
            align-items: center;
            padding: 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .payment-method:hover {
            border-color: #ff6b6b;
            background: #fff5f5;
        }
        
        .payment-method.selected {
            border-color: #ff6b6b;
            background: #fff5f5;
        }
        
        .payment-method .method-icon {
            width: 48px;
            height: 48px;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            margin-right: 16px;
        }
        
        .payment-method .method-name {
            flex: 1;
            font-weight: 500;
            color: #333;
        }
        
        .payment-method .method-check {
            width: 24px;
            height: 24px;
            border: 2px solid #ddd;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.2s;
        }
        
        .payment-method.selected .method-check {
            background: #ff6b6b;
            border-color: #ff6b6b;
        }
        
        .payment-method.selected .method-check::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
        }
        
        /* 订单摘要 */
        .order-summary {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        .order-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            background: #f9f9f9;
            border-radius: 8px;
        }
        
        .order-item img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }
        
        .order-item .item-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .order-item .item-name {
            font-size: 14px;
            color: #333;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .order-item .item-price {
            font-size: 14px;
            color: #ff6b6b;
            font-weight: 500;
        }
        
        .summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        
        .summary-row.label {
            color: #666;
        }
        
        .summary-row.total {
            font-size: 18px;
            font-weight: 600;
            color: #ff6b6b;
            padding-top: 12px;
            border-top: 1px dashed #ddd;
        }
        
        .summary-row.total span:first-child {
            color: #333;
        }
        
        /* 操作按钮 */
        .modal-actions {
            display: flex;
            gap: 12px;
            padding: 20px 24px;
        }
        
        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .btn-secondary {
            background: #ffc107;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #ffb300;
        }
        
        .btn-primary {
            background: #dc3545;
            color: #fff;
        }
        
        .btn-primary:hover {
            background: #c82333;
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 地址选择弹窗 */
        .address-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 10000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(4px);
        }
        
        .address-modal-overlay.active {
            display: flex;
        }
        
        .address-modal {
            background: #fff;
            border-radius: 16px;
            width: 90%;
            max-width: 480px;
            max-height: 70vh;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: modalSlideIn 0.3s ease-out;
        }
        
        .address-modal .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #eee;
        }
        
        .address-modal .modal-header h3 {
            margin: 0;
            font-size: 18px;
            color: #333;
        }
        
        .address-list {
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        
        .address-item {
            padding: 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .address-item:hover {
            border-color: #ff6b6b;
        }
        
        .address-item.selected {
            border-color: #ff6b6b;
            background: #fff5f5;
        }
        
        .address-item .address-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }
        
        .address-item .address-header .name {
            font-weight: 600;
            color: #333;
        }
        
        .address-item .address-header .phone {
            color: #666;
            font-size: 14px;
        }
        
        .address-item .address-detail {
            color: #666;
            font-size: 14px;
            line-height: 1.5;
        }
        
        .address-item .is-default {
            display: inline-block;
            background: #ff6b6b;
            color: #fff;
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-top: 8px;
        }
        
        /* 响应式设计 */
        @media (max-width: 480px) {
            .payment-modal {
                width: 100%;
                max-height: 95vh;
            }
            
            .modal-section {
                padding: 16px;
            }
            
            .modal-actions {
                padding: 16px;
            }
            
            .btn {
                padding: 12px;
                font-size: 14px;
            }
        }
    </style>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 支付弹窗 - 直接显示 -->
    <div class="payment-modal" id="paymentModal">
        <!-- 关闭按钮 -->
        <button class="modal-close" id="modalClose" aria-label="关闭弹窗">
            <i class="fas fa-times"></i>
        </button>

        <!-- 顶部：收货信息 -->
        <div class="modal-section shipping-section">
            <h3 class="section-title">
                <i class="fas fa-map-marker-alt"></i>
                收货信息
            </h3>
            <div class="address-selector" id="addressSelector">
                <div class="address-placeholder" id="addressPlaceholder">
                    <i class="fas fa-plus-circle"></i>
                    <span>点击选择收货地址</span>
                </div>
            </div>
            <button class="address-btn" id="addressBtn">
                <i class="fas fa-search"></i>
                选择收货地址
            </button>
        </div>

        <!-- 中间：支付方式 -->
        <div class="modal-section payment-section">
            <h3 class="section-title">
                <i class="fas fa-credit-card"></i>
                支付方式
            </h3>
            <div class="payment-methods" id="paymentMethods">
                <!-- 支付方式由JS动态生成 -->
            </div>
        </div>

        <!-- 订单摘要 -->
        <div class="modal-section summary-section">
            <h3 class="section-title">
                <i class="fas fa-receipt"></i>
                订单摘要
            </h3>
            <div class="order-summary" id="orderSummary">
                <!-- 订单摘要由JS动态生成 -->
            </div>
        </div>

        <!-- 底部：操作按钮 -->
        <div class="modal-actions">
            <button class="btn btn-secondary" id="returnBtn">
                <i class="fas fa-arrow-left"></i>
                返回我再想想
            </button>
            <button class="btn btn-primary" id="confirmBtn">
                <i class="fas fa-check-circle"></i>
                确定支付
            </button>
        </div>
    </div>

    <!-- 地址选择弹窗 -->
    <div class="address-modal-overlay" id="addressModalOverlay">
        <div class="address-modal" id="addressModal">
            <div class="modal-header">
                <h3>选择收货地址</h3>
                <button class="modal-close" id="addressModalClose" aria-label="关闭">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="address-list" id="addressList">
                <!-- 地址列表由JS动态生成 -->
            </div>
        </div>
    </div>

    <script src="/js/orderManagement.js"></script>
    <script src="/js/payment-modal.js"></script>
</body>
</html>
