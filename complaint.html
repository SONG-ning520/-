<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>投诉建议 - 电商平台</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(to right, #f5f7fa 0%, #e4e8ec 100%);
            min-height: 100vh;
        }

        .top-frame-container {
            width: 100%;
            position: relative;
            z-index: 100;
        }

        #topFrame {
            width: 100%;
            height: 280px;
            border: none;
            display: block;
            overflow: visible;
        }

        .complaint-page {
            max-width: 800px;
            margin: -100px auto 40px;
            padding: 0 20px;
            position: relative;
            z-index: 50;
        }

        .breadcrumb {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 8px;
            padding: 12px 20px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            font-size: 14px;
        }

        .breadcrumb a {
            color: #666;
            text-decoration: none;
        }

        .breadcrumb a:hover {
            color: #ff6b6b;
        }

        .breadcrumb span {
            color: #999;
            margin: 0 8px;
        }

        .breadcrumb .current {
            color: #ff6b6b;
            font-weight: 500;
        }

        .page-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            margin-bottom: 30px;
            color: #fff;
            box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3);
        }

        .page-header h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .page-header p {
            font-size: 16px;
            opacity: 0.9;
        }

        .complaint-form {
            background: #fff;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            font-size: 15px;
        }

        .form-group label .required {
            color: #ff6b6b;
            margin-left: 4px;
        }

        .form-group .hint {
            font-size: 13px;
            color: #999;
            margin-top: 6px;
            font-weight: 400;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            transition: border-color 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .form-control:focus {
            border-color: #667eea;
        }

        .form-control::placeholder {
            color: #999;
        }

        .form-control.error {
            border-color: #ff6b6b;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '\f078';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            pointer-events: none;
        }

        select.form-control {
            appearance: none;
            background-color: #fff;
            cursor: pointer;
        }

        textarea.form-control {
            resize: vertical;
            min-height: 120px;
            line-height: 1.6;
        }

        .type-options {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
        }

        .type-option {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #fff;
        }

        .type-option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .type-option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8edff 100%);
            color: #667eea;
        }

        .type-option input {
            display: none;
        }

        .type-option i {
            margin-right: 10px;
            font-size: 18px;
        }

        .type-option span {
            font-weight: 500;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 30px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .success-message {
            display: none;
            text-align: center;
            padding: 60px 20px;
        }

        .success-message i {
            font-size: 72px;
            color: #10b981;
            margin-bottom: 20px;
            animation: bounce 0.6s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .success-message h2 {
            font-size: 24px;
            color: #333;
            margin-bottom: 12px;
        }

        .success-message p {
            color: #666;
            line-height: 1.8;
        }

        .success-message .back-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 24px;
            transition: transform 0.2s ease;
        }

        .success-message .back-btn:hover {
            transform: translateY(-2px);
        }

        .back-to-home {
            text-align: center;
            margin-top: 24px;
        }

        .back-home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .back-home-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .back-home-btn:active {
            transform: translateY(0);
        }

        .back-home-btn i {
            font-size: 18px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: #fff;
            border-radius: 16px;
            padding: 40px;
            max-width: 480px;
            width: 90%;
            text-align: center;
            animation: slideUp 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content .modal-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 36px;
            color: #fff;
        }

        .modal-content .modal-message {
            font-size: 16px;
            color: #666;
            line-height: 1.8;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .modal-content .modal-close-btn {
            padding: 12px 36px;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .modal-content .modal-close-btn:hover {
            transform: translateY(-2px);
        }

        .modal-content .modal-footer {
            font-size: 14px;
            color: #999;
            margin-top: 16px;
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f0f0;
        }

        .form-header i {
            font-size: 28px;
            color: #667eea;
        }

        .form-header h2 {
            font-size: 20px;
            color: #333;
        }

        .form-header p {
            font-size: 14px;
            color: #999;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .page-header h1 {
                font-size: 24px;
            }

            .complaint-form {
                padding: 20px;
            }

            .type-options {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="top-frame-container">
        <iframe id="topFrame" src="../top.html"></iframe>
    </div>

    <div class="complaint-page">
        <div class="breadcrumb">
            <a href="../index.html">首页</a>
            <span><i class="fas fa-chevron-right"></i></span>
            <a href="help-center.html">客户服务</a>
            <span><i class="fas fa-chevron-right"></i></span>
            <span class="current">投诉建议</span>
        </div>

        <div class="page-header">
            <h1><i class="fas fa-comments"></i> 投诉建议</h1>
            <p>您的反馈是我们进步的动力，感谢您的宝贵意见</p>
        </div>

        <form class="complaint-form" id="complaintForm">
            <div class="form-header">
                <i class="fas fa-pen-square"></i>
                <div>
                    <h2>提交您的投诉或建议</h2>
                    <p>请详细描述您的问题，我们会尽快处理并回复您</p>
                </div>
            </div>

            <div class="form-group">
                <label>问题类型 <span class="required">*</span></label>
                <div class="type-options">
                    <label class="type-option">
                        <input type="radio" name="complaintType" value="order" required>
                        <i class="fas fa-shopping-cart"></i>
                        <span>订单问题</span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="complaintType" value="product" required>
                        <i class="fas fa-box"></i>
                        <span>商品问题</span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="complaintType" value="service" required>
                        <i class="fas fa-headset"></i>
                        <span>服务问题</span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="complaintType" value="payment" required>
                        <i class="fas fa-credit-card"></i>
                        <span>支付问题</span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="complaintType" value="suggestion" required>
                        <i class="fas fa-lightbulb"></i>
                        <span>功能建议</span>
                    </label>
                    <label class="type-option">
                        <input type="radio" name="complaintType" value="other" required>
                        <i class="fas fa-ellipsis-h"></i>
                        <span>其他问题</span>
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>订单编号 <span class="required">*</span></label>
                <div class="select-wrapper">
                    <select class="form-control" id="orderId" name="orderId">
                        <option value="">请选择订单编号</option>
                        <option value="ORD202401150001">ORD202401150001 - 订单1</option>
                        <option value="ORD202401150002">ORD202401150002 - 订单2</option>
                        <option value="ORD202401150003">ORD202401150003 - 订单3</option>
                        <option value="other">其他（请手动输入）</option>
                    </select>
                </div>
                <input type="text" class="form-control" id="customOrderId" name="customOrderId" placeholder="请输入订单编号" style="display: none;">
                <div class="hint">如果没有相关订单，请选择"其他"</div>
            </div>

            <div class="form-group">
                <label>问题描述 <span class="required">*</span></label>
                <textarea class="form-control" id="description" name="description" placeholder="请详细描述您遇到的问题或建议，包括时间、地点、具体情况等..."></textarea>
                <div class="hint">请提供尽可能详细的信息，以便我们更好地为您处理</div>
            </div>

            <div class="form-group">
                <label>联系方式 <span class="required">*</span></label>
                <input type="text" class="form-control" id="contact" name="contact" placeholder="请输入手机号码或邮箱地址">
                <div class="hint">我们将通过此联系方式与您取得联系</div>
            </div>

            <div class="form-group">
                <label>上传图片（选填）</label>
                <div class="upload-area">
                    <div class="upload-box" onclick="triggerFileUpload()">
                        <i class="fas fa-upload"></i>
                        <span>点击或拖拽上传图片</span>
                        <p class="hint">支持 jpg、png、gif 格式，单个文件不超过 5MB</p>
                    </div>
                    <input type="file" id="imageUpload" accept="image/*" multiple style="display: none;" onchange="handleFileSelect()">
                </div>
                <div id="uploadPreview" class="upload-preview"></div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-paper-plane"></i> 提交投诉建议
            </button>
        </form>

        <div class="success-message" id="successMessage">
            <i class="fas fa-check-circle"></i>
            <h2>提交成功</h2>
            <p>感谢您的反馈！我们已收到您的投诉/建议，<br>客服人员会在24小时内与您联系处理。</p>
            <p style="margin-top: 12px;">您的反馈编号：<strong id="complaintId"></strong></p>
            <a href="help-center.html" class="back-btn">返回帮助中心</a>
        </div>

        <div class="back-to-home">
            <a href="../index.html" class="back-home-btn">
                <i class="fas fa-home"></i> 返回首页
            </a>
        </div>
    </div>

    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <div class="modal-icon">
                <i class="fas fa-check"></i>
            </div>
            <div class="modal-message">
                已收到，我们会改进，谢谢您的建议，给您带来不便深感抱歉
            </div>
            <button class="modal-close-btn" onclick="closeModal()">
                确定
            </button>
            <div class="modal-footer">
                弹窗将在 <span id="countdown">5</span> 秒后自动关闭
            </div>
        </div>
    </div>

    <script>
        const complaintForm = document.getElementById('complaintForm');
        const successMessage = document.getElementById('successMessage');
        const orderIdSelect = document.getElementById('orderId');
        const customOrderId = document.getElementById('customOrderId');

        orderIdSelect.addEventListener('change', function() {
            if (this.value === 'other') {
                customOrderId.style.display = 'block';
                customOrderId.required = true;
            } else {
                customOrderId.style.display = 'none';
                customOrderId.required = false;
                customOrderId.value = '';
            }
        });

        const typeOptions = document.querySelectorAll('.type-option');
        typeOptions.forEach(option => {
            option.addEventListener('click', function() {
                typeOptions.forEach(opt => opt.classList.remove('selected'));
                this.classList.add('selected');
                this.querySelector('input').checked = true;
            });
        });

        function triggerFileUpload() {
            document.getElementById('imageUpload').click();
        }

        function handleFileSelect() {
            const files = document.getElementById('imageUpload').files;
            const preview = document.getElementById('uploadPreview');
            
            if (files && files.length > 0) {
                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.style.cssText = `
                            width: 100px;
                            height: 100px;
                            object-fit: cover;
                            border-radius: 8px;
                            margin-right: 10px;
                            margin-bottom: 10px;
                            border: 2px solid #e0e0e0;
                        `;
                        preview.appendChild(img);
                    };
                    reader.readAsDataURL(file);
                });
            }
        }

        complaintForm.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const complaintType = document.querySelector('input[name="complaintType"]:checked');
            const orderId = document.getElementById('orderId').value;
            const description = document.getElementById('description').value.trim();
            const contact = document.getElementById('contact').value.trim();

            let isValid = true;
            let errorMessage = '';

            if (!complaintType) {
                isValid = false;
                errorMessage = '请选择问题类型';
            } else if (!orderId) {
                isValid = false;
                errorMessage = '请选择或输入订单编号';
            } else if (!description) {
                isValid = false;
                errorMessage = '请输入问题描述';
            } else if (!contact) {
                isValid = false;
                errorMessage = '请输入联系方式';
            }

            if (!isValid) {
                alert(errorMessage);
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...';

            setTimeout(() => {
                const complaintId = 'CP' + Date.now();
                
                document.getElementById('complaintId').textContent = complaintId;
                
                complaintForm.style.display = 'none';
                successMessage.style.display = 'block';
                
                localStorage.setItem('lastComplaint', JSON.stringify({
                    id: complaintId,
                    time: new Date().toISOString()
                }));
                
                showModal();
            }, 1500);
        });

        function showModal() {
            const modal = document.getElementById('successModal');
            modal.classList.add('active');
            
            let countdown = 5;
            const countdownEl = document.getElementById('countdown');
            
            const timer = setInterval(() => {
                countdown--;
                countdownEl.textContent = countdown;
                
                if (countdown <= 0) {
                    clearInterval(timer);
                    closeModal();
                }
            }, 1000);
        }

        function closeModal() {
            const modal = document.getElementById('successModal');
            modal.classList.remove('active');
        }

        document.getElementById('successModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });
    </script>
</body>
</html>
