<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>待付款订单</title>
    <link rel="stylesheet" href="/css/orders.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="order-page">
        <!-- 顶部导航 -->
        <header class="page-header">
            <button class="back-btn" id="backBtn">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1>待付款</h1>
            <div class="placeholder"></div>
        </header>

        <!-- 订单列表 -->
        <main class="page-content">
            <div class="order-list" id="orderList">
                <!-- 订单列表由JS动态生成 -->
            </div>

            <!-- 空状态 -->
            <div class="empty-state pending-payment" id="emptyState">
                <div class="empty-icon">
                    <i class="fas fa-shopping-cart"></i>
                </div>
                <h2>暂无待付款订单</h2>
                <p>快去挑选心仪的商品吧，下单后记得及时付款哦~</p>
                <button class="btn btn-primary" id="goShoppingBtn">去购物</button>
            </div>
        </main>

        <!-- 底部导航 -->
        <footer class="page-footer">
            <nav class="nav-tabs">
                <a href="order-pending-payment.html" class="nav-item active">
                    <i class="fas fa-clock"></i>
                    <span>待付款</span>
                </a>
                <a href="order-pending-shipment.html" class="nav-item">
                    <i class="fas fa-truck"></i>
                    <span>待发货</span>
                </a>
                <a href="order-pending-receipt.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>待收货</span>
                </a>
                <a href="order-completed.html" class="nav-item">
                    <i class="fas fa-check-circle"></i>
                    <span>已完成</span>
                </a>
            </nav>
        </footer>
    </div>

    <script src="/js/orderManagement.js"></script>
    <script src="/js/order-pending-payment.js"></script>
</body>
</html>
