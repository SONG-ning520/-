<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国补活动 - 电商平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        .page-header { background: linear-gradient(135deg, #e53935 0%, #ff6b6b 100%); color: #fff; text-align: center; padding: 60px 20px; }
        .page-header h1 { font-size: 42px; margin-bottom: 16px; }
        .page-header p { font-size: 18px; opacity: 0.9; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px 20px; }
        .breadcrumb { background: #fff; padding: 12px 24px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .breadcrumb a { color: #667eea; text-decoration: none; }
        .breadcrumb span { color: #999; margin: 0 8px; }
        .activity-card { background: #fff; border-radius: 16px; padding: 40px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .activity-card h2 { color: #e53935; font-size: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .activity-card p { color: #666; line-height: 1.8; font-size: 16px; margin-bottom: 16px; }
        .highlight-box { background: linear-gradient(135deg, #fff5f5 0%, #fff 100%); border-left: 4px solid #e53935; padding: 20px; margin: 20px 0; border-radius: 0 8px 8px 0; }
        .highlight-box p { margin: 0; color: #c53030; font-weight: 500; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .product-item { background: #fff; border-radius: 12px; padding: 20px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); transition: transform 0.3s ease; }
        .product-item:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.1); }
        .product-item i { font-size: 48px; color: #e53935; margin-bottom: 12px; }
        .product-item h3 { font-size: 18px; color: #333; margin-bottom: 8px; }
        .product-item .price { color: #e53935; font-size: 24px; font-weight: 700; }
        .product-item .price span { font-size: 14px; color: #999; text-decoration: line-through; margin-left: 8px; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; text-decoration: none; border-radius: 25px; font-weight: 600; margin-top: 30px; transition: transform 0.3s ease; }
        .back-btn:hover { transform: translateY(-2px); }
        .center { text-align: center; }
    </style>
</head>
<body>
    <div class="page-header">
        <h1><i class="fas fa-landmark"></i> 国家补贴政策</h1>
        <p>购买指定商品享受国家补贴，最高补贴20%</p>
    </div>
    
    <div class="container">
        <div class="breadcrumb">
            <a href="index.html">首页</a>
            <span>/</span>
            <span>国补活动</span>
        </div>
        
        <div class="activity-card">
            <h2><i class="fas fa-info-circle"></i> 活动说明</h2>
            <p>为响应国家促进消费政策，本平台联合各大品牌商家推出"国补专区"活动。消费者在活动期间购买指定品类商品，可享受国家补贴优惠。</p>
            <div class="highlight-box">
                <p><i class="fas fa-star"></i> 活动有效期：2026年6月1日 - 2026年12月31日</p>
            </div>
        </div>
        
        <div class="activity-card">
            <h2><i class="fas fa-list"></i> 补贴品类</h2>
            <div class="product-grid">
                <div class="product-item">
                    <i class="fas fa-mobile-alt"></i>
                    <h3>手机数码</h3>
                    <div class="price">补贴15% <span>原价购买</span></div>
                </div>
                <div class="product-item">
                    <i class="fas fa-laptop"></i>
                    <h3>电脑办公</h3>
                    <div class="price">补贴20% <span>原价购买</span></div>
                </div>
                <div class="product-item">
                    <i class="fas fa-tv"></i>
                    <h3>家用电器</h3>
                    <div class="price">补贴15% <span>原价购买</span></div>
                </div>
                <div class="product-item">
                    <i class="fas fa-car"></i>
                    <h3>汽车用品</h3>
                    <div class="price">补贴10% <span>原价购买</span></div>
                </div>
            </div>
        </div>
        
        <div class="center">
            <a href="index.html" class="back-btn"><i class="fas fa-home"></i> 返回首页</a>
        </div>
    </div>
</body>
</html>
