<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>超值百货 - 电商平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        .page-header { background: linear-gradient(135deg, #ff6b6b 0%, #ffa502 100%); color: #fff; text-align: center; padding: 60px 20px; }
        .page-header h1 { font-size: 42px; margin-bottom: 16px; }
        .page-header p { font-size: 18px; opacity: 0.9; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .breadcrumb { background: #fff; padding: 12px 24px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .breadcrumb a { color: #667eea; text-decoration: none; }
        .breadcrumb span { color: #999; margin: 0 8px; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        
        .product-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        
        .product-card .image-container {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .product-card .image-container img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        .product-card .info { padding: 20px; }
        
        .product-card .category {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .product-card .name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .product-card .price-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        
        .product-card .price {
            font-size: 24px;
            font-weight: 700;
            color: #e53935;
        }
        
        .product-card .original-price {
            font-size: 14px;
            color: #999;
            text-decoration: line-through;
        }
        
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; text-decoration: none; border-radius: 25px; font-weight: 600; margin-top: 40px; transition: transform 0.3s ease; }
        .back-btn:hover { transform: translateY(-2px); }
        .center { text-align: center; }
        
        @media (max-width: 768px) {
            .page-header h1 { font-size: 28px; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
        }
    </style>
</head>

    </div>
    
    <div class="container">

        <div id="productsContainer" class="products-grid"></div>
        
        <div class="center">

            { id: 69, name: '果冻（水果味）', category: '零食', price: 12, originalPrice: 16, image: '../tupian/shangpin/lingshi/Snipaste_2026-06-14_17-04-38.png' },
            { id: 70, name: '蜜饯（果干/混合）', category: '零食', price: 25, originalPrice: 33, image: '../tupian/shangpin/lingshi/Snipaste_2026-06-14_17-04-50.png' }
        ];
        
        // 渲染商品
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            
            // 筛选600元以下的商品
            const filteredProducts = productData.filter(p => p.price < 600);
            
            // 按价格排序
            const sortedProducts = filteredProducts.sort((a, b) => a.price - b.price);
            
            container.innerHTML = sortedProducts.map(product => `
                <div class="product-card" onclick="goToDetail(${product.id})">
                    <div class="image-container">
                        <img src="${product.image}" alt="${product.name}" 
                             onerror="this.src='../tupian/default.png'; this.onerror=null;">
                    </div>
                    <div class="info">
                        <span class="category">${product.category}</span>
                        <h3 class="name">${product.name}</h3>
                        <div class="price-row">
                            <span class="price">¥${product.price.toFixed(2)}</span>
                            <span class="original-price">¥${product.originalPrice.toFixed(2)}</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        function goToDetail(id) {
            window.location.href = '商品详情.html?id=' + id;
        }
        
        document.addEventListener('DOMContentLoaded', renderProducts);
    </script>
</body>
</html>
