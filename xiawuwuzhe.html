<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夏日5折 - 电商平台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        .page-header { background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%); color: #fff; text-align: center; padding: 60px 20px; }
        .page-header h1 { font-size: 42px; margin-bottom: 16px; }
        .page-header p { font-size: 18px; opacity: 0.9; }
        .container { max-width: 1400px; margin: 0 auto; padding: 40px 20px; }
        .breadcrumb { background: #fff; padding: 12px 24px; border-radius: 8px; margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        .breadcrumb a { color: #667eea; text-decoration: none; }
        .breadcrumb span { color: #999; margin: 0 8px; }
        
        .notice {
            background: linear-gradient(135deg, #e0f7fa 0%, #fff 100%);
            border-left: 4px solid #00b4db;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 0 12px 12px 0;
        }
        .notice p { color: #0083b0; font-size: 16px; margin: 0; }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 20px;
        }
        
        .product-card {
            background: #fff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
        }
        
        .discount-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #ff4757 0%, #ff6b81 100%);
            color: #fff;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 700;
            z-index: 10;
        }
        
        .product-card .image-container {
            width: 100%;
            height: 220px;
            background: linear-gradient(135deg, #e0f7fa 0%, #b2ebf2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .product-card .image-container img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }
        
        .product-card .info { padding: 20px; }
        
        .product-card .category {
            display: inline-block;
            background: linear-gradient(135deg, #00b4db 0%, #0083b0 100%);
            color: #fff;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            margin-bottom: 10px;
        }
        
        .product-card .name {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            line-height: 1.4;
        }
        
        .product-card .price-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }
        
        .product-card .price {
            font-size: 24px;
            font-weight: 700;
            color: #e53935;
        }
        
        .product-card .original-price {
            font-size: 14px;
            color: #999;
            text-decoration: line-through;
        }
        
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 30px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; text-decoration: none; border-radius: 25px; font-weight: 600; margin-top: 40px; transition: transform 0.3s ease; }
        .back-btn:hover { transform: translateY(-2px); }
        .center { text-align: center; }
        
        @media (max-width: 768px) {
            .page-header h1 { font-size: 28px; }
            .products-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; }
        }
    </style>
</head>
<body>

        <div id="productsContainer" class="products-grid"></div>
        
        <div class="center">

            { id: 33, name: '高跟鞋（细跟/优雅）', category: '鞋靴', price: 259, originalPrice: 337, image: '../tupian/shangpin/xiexue/Snipaste_2026-06-14_16-50-32.png' },
            { id: 34, name: '帆布鞋（经典/百搭）', category: '鞋靴', price: 129, originalPrice: 168, image: '../tupian/shangpin/xiexue/Snipaste_2026-06-14_16-51-06.png' },
            { id: 35, name: '拖鞋（居家/舒适）', category: '鞋靴', price: 49, originalPrice: 64, image: '../tupian/shangpin/xiexue/Snipaste_2026-06-14_16-51-22.png' }
        ];
        
        // 计算折扣
        function getDiscount(originalPrice, price) {
            if (!originalPrice || originalPrice <= price) return null;
            return Math.round((1 - price / originalPrice) * 10);
        }
        
        // 渲染商品
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            
            // 随机打乱顺序
            const shuffled = productData.sort(() => Math.random() - 0.5);
            
            container.innerHTML = shuffled.map(product => {
                const discount = getDiscount(product.originalPrice, product.price);
                return `
                    <div class="product-card" onclick="goToDetail(${product.id})">
                        ${discount ? `<span class="discount-badge">${discount}折</span>` : ''}
                        <div class="image-container">
                            <img src="${product.image}" alt="${product.name}" 
                                 onerror="this.src='../tupian/default.png'; this.onerror=null;">
                        </div>
                        <div class="info">
                            <span class="category">${product.category}</span>
                            <h3 class="name">${product.name}</h3>
                            <div class="price-row">
                                <span class="price">¥${product.price.toFixed(2)}</span>
                                <span class="original-price">¥${product.originalPrice.toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function goToDetail(id) {
            window.location.href = '商品详情.html?id=' + id;
        }
        
        document.addEventListener('DOMContentLoaded', renderProducts);
    </script>
</body>
</html>
